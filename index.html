<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Persicco — Disponibilidad de productos</title>
<style>
  /* ── Reset & base ── */
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e10;color:#f0f0f3;font-family:"Inter",system-ui,sans-serif;font-size:14px;min-height:100vh}
  a{color:inherit;text-decoration:none}

  /* ── Topbar ── */
  .topbar{display:flex;align-items:center;gap:14px;padding:14px 28px;background:#18181c;border-bottom:1px solid rgba(255,255,255,.07);position:sticky;top:0;z-index:20;backdrop-filter:blur(8px)}
  .topbar-logo{height:54px;border-radius:12px;box-shadow:0 2px 16px rgba(234,179,8,.2)}
  .topbar-title{font-size:19px;font-weight:900;letter-spacing:-.3px}
  .topbar-sub{font-size:12px;color:#78788a;margin-top:2px}
  .topbar-right{margin-left:auto;text-align:right}
  .upd-badge{font-size:11px;color:#4a4a5a;display:flex;align-items:center;gap:5px;justify-content:flex-end}
  .upd-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  /* ── Layout: sidebar + detail ── */
  .layout{display:flex;max-width:1400px;margin:0 auto;align-items:flex-start}
  .sidebar{width:290px;flex-shrink:0;border-right:1px solid rgba(255,255,255,.07);padding:16px 10px 40px;position:sticky;top:83px;height:calc(100vh - 83px);overflow-y:auto}
  .sidebar-summary{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;padding:0 6px}
  .mini-chip{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:999px;display:inline-flex;align-items:center;gap:3px}
  .mini-chip.warn{background:rgba(248,113,113,.12);color:#f87171}
  .mini-chip.ok{background:rgba(34,197,94,.12);color:#4ade80}
  .mini-chip.neu{background:rgba(120,120,138,.12);color:#a0a0b0}

  .suc-item{display:flex;align-items:center;gap:8px;padding:10px 10px;border-radius:10px;cursor:pointer;margin-bottom:3px;transition:.15s;border:1px solid transparent}
  .suc-item:hover{background:rgba(255,255,255,.04)}
  .suc-item.active{background:rgba(99,102,241,.14);border-color:rgba(99,102,241,.3)}
  .suc-item .li-name{font-weight:700;font-size:13px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .suc-item.overview-item .li-name{font-weight:800}
  .li-badge{background:rgba(248,113,113,.15);color:#f87171;font-size:11px;font-weight:800;padding:2px 7px;border-radius:999px;flex-shrink:0}
  .li-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .li-dot.ok{background:#4ade80}
  .li-dot.gray{background:#4a4a58}
  .closed-tag{font-size:8.5px;font-weight:800;background:rgba(234,179,8,.15);color:#fbbf24;padding:1px 5px;border-radius:5px;flex-shrink:0}
  .fab-tag{font-size:8.5px;font-weight:800;background:rgba(167,139,250,.15);color:#a78bfa;padding:1px 5px;border-radius:5px;flex-shrink:0}
  .suc-item.fab-item{background:rgba(167,139,250,.06)}
  .sidebar-divider{height:1px;background:rgba(255,255,255,.07);margin:10px 6px 12px}
  .fab-banner{background:rgba(167,139,250,.08);border:1px solid rgba(167,139,250,.25);border-radius:10px;padding:10px 14px;color:#c4b5fd;font-size:12px;display:flex;align-items:center;gap:8px;margin-bottom:16px}

  .detail{flex:1;min-width:0;padding:24px 24px 60px}

  /* ── Summary cards (overview) ── */
  .summary-bar{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:22px}
  .sum-card{background:#18181c;border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:14px 20px;flex:1;min-width:140px}
  .sum-card .num{font-size:28px;font-weight:900;line-height:1}
  .sum-card .lbl{font-size:11px;color:#78788a;margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
  .sum-card.warn .num{color:#f87171}
  .sum-card.ok .num{color:#4ade80}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}

  /* ── Cards (overview grid) ── */
  .card{background:#18181c;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:18px;display:flex;flex-direction:column;gap:11px;transition:.2s;cursor:pointer}
  .card:hover{border-color:rgba(255,255,255,.15);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.4)}
  .card.all-ok{border-color:rgba(34,197,94,.15)}
  .card.has-falt{border-color:rgba(248,113,113,.15)}
  .card.cerrada{opacity:.65;border-color:rgba(234,179,8,.2)}
  .card.sin-datos{opacity:.5}

  .card-head{display:flex;align-items:flex-start;gap:8px}
  .card-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
  .card-icon.ok{background:rgba(34,197,94,.12)}
  .card-icon.falt{background:rgba(248,113,113,.1)}
  .card-icon.cerr{background:rgba(234,179,8,.1)}
  .card-icon.nd{background:rgba(120,120,138,.1)}
  .card-name{font-size:15px;font-weight:800;line-height:1.2}
  .card-addr{font-size:11px;color:#4a4a58;margin-top:2px}

  /* Tags */
  .tags{display:flex;gap:5px;flex-wrap:wrap}
  .tag{font-size:10px;font-weight:700;padding:2px 9px;border-radius:999px;display:inline-flex;align-items:center;gap:3px}
  .tag.ok{background:rgba(34,197,94,.12);color:#4ade80;border:1px solid rgba(34,197,94,.2)}
  .tag.falt{background:rgba(248,113,113,.12);color:#f87171;border:1px solid rgba(248,113,113,.25)}
  .tag.cerr{background:rgba(234,179,8,.1);color:#fbbf24;border:1px solid rgba(234,179,8,.2)}
  .tag.nd{background:rgba(120,120,138,.1);color:#78788a;border:1px solid rgba(120,120,138,.2)}

  /* Sections */
  .sec-hdr{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#4a4a58;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:center;justify-content:space-between}
  .sec-cnt{font-size:11px;color:#78788a}
  .falt-list{display:flex;flex-direction:column;gap:3px;max-height:160px;overflow-y:auto;padding-right:2px}
  .falt-item{font-size:12px;color:#f87171;padding:3px 0;border-bottom:1px solid rgba(248,113,113,.07)}
  .falt-item:last-child{border:none}
  .ok-line{font-size:12px;color:#4ade80;padding:3px 0;display:flex;align-items:center;gap:5px}
  .ok-line2{font-size:12px;color:#a0a0b0;padding:2px 0}

  /* Banner cerrada */
  .cerr-banner{background:rgba(234,179,8,.07);border:1px solid rgba(234,179,8,.2);border-radius:10px;padding:10px 14px;color:#fbbf24;font-size:12px;display:flex;align-items:center;gap:8px}

  /* ── Detail view (single sucursal) ── */
  .detail-head-row{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;margin-bottom:18px}
  .detail-head-row .detail-head{margin-bottom:0;flex:1;min-width:0}
  .detail-head{display:flex;align-items:flex-start;gap:14px;margin-bottom:18px}

  /* ── Botón enviar faltantes ── */
  .send-wrap{position:relative;flex-shrink:0}
  .send-btn{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-size:13px;font-weight:800;padding:11px 18px;border-radius:11px;cursor:pointer;border:none;box-shadow:0 4px 18px rgba(99,102,241,.35);transition:.18s;white-space:nowrap}
  .send-btn:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(99,102,241,.45)}
  .send-btn:active{transform:translateY(0)}
  .send-menu{position:absolute;top:calc(100% + 8px);right:0;background:#1f1f24;border:1px solid rgba(255,255,255,.1);border-radius:13px;padding:8px;min-width:230px;max-width:calc(100vw - 40px);box-shadow:0 14px 36px rgba(0,0,0,.55);z-index:30;display:none}
  .send-menu.open{display:block}
  .send-menu-hint{font-size:10px;color:#78788a;text-transform:uppercase;letter-spacing:.4px;padding:4px 10px 8px;font-weight:700}
  .send-menu-item{display:flex;align-items:center;gap:10px;padding:10px 11px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:700;color:#f0f0f3;transition:.12s}
  .send-menu-item:hover{background:rgba(255,255,255,.07)}
  .send-menu-item .send-sub{font-size:10.5px;font-weight:600;color:#78788a;margin-left:auto}
  .send-menu-item.disabled{color:#78788a}
  .detail-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
  .detail-icon.ok{background:rgba(34,197,94,.12)}
  .detail-icon.falt{background:rgba(248,113,113,.1)}
  .detail-icon.cerr{background:rgba(234,179,8,.1)}
  .detail-icon.nd{background:rgba(120,120,138,.1)}
  .detail-name{font-size:22px;font-weight:900}
  .detail-addr{font-size:13px;color:#78788a;margin-top:3px}

  .detail-block{background:#18181c;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:18px;margin-bottom:16px}
  .detail-block-title{font-size:13px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:8px}
  .detail-cols{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px}
  .d-col{min-width:0}
  .d-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#78788a;margin-bottom:8px}
  .d-title.bad{color:#f87171}
  .ulist{display:flex;flex-direction:column;gap:4px;max-height:240px;overflow-y:auto;padding-right:4px}
  .ulist .it{font-size:12.5px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.05)}
  .ulist .it:last-child{border:none}
  .ulist .it.miss{color:#f87171}
  .ulist.empty-note{color:#4a4a58;font-style:italic;font-size:12px}

  /* Back button */
  .back-btn{display:inline-flex;align-items:center;gap:6px;background:#18181c;border:1px solid rgba(255,255,255,.08);color:#a0a0b0;font-size:12px;font-weight:700;padding:7px 13px;border-radius:9px;cursor:pointer;margin-bottom:16px}
  .back-btn:hover{border-color:rgba(255,255,255,.2);color:#f0f0f3}

  /* ── Historial ── */
  .hist-dates-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
  .hist-date-btn{background:#0e0e10;border:1px solid rgba(255,255,255,.08);color:#a0a0b0;font-size:11.5px;font-weight:600;padding:6px 11px;border-radius:8px;cursor:pointer;transition:.15s}
  .hist-date-btn:hover{border-color:rgba(255,255,255,.2);color:#f0f0f3}
  .hist-date-btn.active{background:rgba(99,102,241,.16);border-color:rgba(99,102,241,.4);color:#c7c9ff}
  .hist-meta{font-size:11.5px;color:#78788a;margin-bottom:12px}
  .hist-empty{color:#4a4a58;font-style:italic;font-size:12.5px;padding:6px 0}
  .hist-cerrada-banner{background:rgba(234,179,8,.07);border:1px solid rgba(234,179,8,.2);border-radius:10px;padding:10px 14px;color:#fbbf24;font-size:12px;display:flex;align-items:flex-start;gap:8px;margin-bottom:14px}

  /* Loading / error */
  .status-msg{text-align:center;padding:80px 20px;color:#4a4a58;font-size:14px}
  .loader{display:inline-block;width:32px;height:32px;border:3px solid rgba(255,255,255,.06);border-top-color:#eab308;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* Scrollbar */
  ::-webkit-scrollbar{width:4px;height:4px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:4px}

  /* Mobile */
  @media(max-width:780px){
    .topbar{padding:12px 16px}
    .layout{flex-direction:column}
    .sidebar{width:100%;height:auto;position:static;border-right:none;border-bottom:1px solid rgba(255,255,255,.07);padding:12px 12px 14px;max-height:none}
    .detail{padding:18px 14px 40px}
    .detail-cols{grid-template-columns:1fr}
    .detail-head-row{flex-wrap:wrap}
    .send-wrap{width:100%}
    .send-btn{width:100%;justify-content:center}
    .send-menu{left:0;right:0;width:100%}
  }
</style>
</head>
<body>

<div class="topbar">
  <!-- LOGO: reemplazá la URL por la imagen real de tu logo si querés -->
  <img class="topbar-logo" src="https://i.imgur.com/PLACEHOLDER.png" alt="Persicco" onerror="this.style.display='none'">
  <div>
    <div class="topbar-title">Persicco Helados</div>
    <div class="topbar-sub">Disponibilidad de productos por sucursal</div>
  </div>
  <div class="topbar-right">
    <div class="upd-badge"><div class="upd-dot"></div><span id="updTime">–</span></div>
  </div>
</div>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-summary" id="sidebarSummary"></div>
    <div id="sucList">
      <div class="status-msg" style="padding:30px 10px"><div class="loader"></div></div>
    </div>
  </aside>
  <main class="detail" id="detail">
    <div class="status-msg">
      <div class="loader"></div><br>Cargando datos...
    </div>
  </main>
</div>

<script>
// ══════════════════════════════════════════════════════════════
// CONFIGURACIÓN — reemplazá GIST_RAW_URL con la URL real
// después de publicar por primera vez desde el dashboard
// ══════════════════════════════════════════════════════════════
const GIST_RAW_URL = 'https://gist.githubusercontent.com/manchacolores-hub/dcc09a47ba636bcd063145303784d55e/raw/persicco_resultados.json';
// ══════════════════════════════════════════════════════════════

let DATA = null;
let selectedNombre = '__overview__';
let histSelIdx = {}; // nombre -> índice seleccionado en su historial

async function loadData(){
  if(GIST_RAW_URL === 'REEMPLAZAR_CON_URL_DEL_GIST'){
    document.getElementById('detail').innerHTML =
      '<div class="status-msg">⚙️ Falta configurar la URL del Gist en index.html<br><small>Seguí las instrucciones de setup.</small></div>';
    return;
  }
  try{
    // cache-bust para evitar datos viejos
    const r = await fetch(GIST_RAW_URL + '?t=' + Date.now());
    if(!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    DATA = data;
    if(data.updated_at){
      const d = new Date(data.updated_at);
      document.getElementById('updTime').textContent =
        'Actualizado: ' + d.toLocaleDateString('es-AR') + ' ' + d.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
    }
    renderSidebar();
    renderDetail();
  } catch(e){
    document.getElementById('detail').innerHTML =
      '<div class="status-msg">❌ No se pudieron cargar los datos.<br><small>'+e.message+'</small></div>';
  }
}

function missCount(s){
  return (s.miss_sabores||[]).length + (s.miss_guapaletas||[]).length + (s.miss_helados||[]).length;
}

function statusOf(s){
  if(s.esFabrica) return {iconClass:'ok', emoji:'🏭', tagHtml:'<span class="tag ok" style="background:rgba(167,139,250,.12);color:#a78bfa;border-color:rgba(167,139,250,.25)">🏭 Fábrica (referencia)</span>'};
  if(s.sin_datos) return {iconClass:'nd', emoji:'–', tagHtml:'<span class="tag nd">Sin datos</span>'};
  if(s.cerrada)   return {iconClass:'cerr', emoji:'🔒', tagHtml:'<span class="tag cerr">Cerrada</span>'};
  const m = missCount(s);
  if(m>0) return {iconClass:'falt', emoji:'!', tagHtml:'<span class="tag falt">'+m+' faltantes</span>'};
  return {iconClass:'ok', emoji:'✓', tagHtml:'<span class="tag ok">✓ Completa</span>'};
}

function selectSuc(nombre){
  selectedNombre = nombre;
  renderSidebar();
  renderDetail();
  window.scrollTo({top:0, behavior:'smooth'});
}

function renderSidebar(){
  if(!DATA) return;
  const sucs = DATA.sucursales || [];
  const clientSucs = sucs.filter(s=>!s.esFabrica);
  const totalFalt = clientSucs.filter(s=>!s.cerrada&&!s.sin_datos&&missCount(s)>0).length;
  const totalOk   = clientSucs.filter(s=>!s.cerrada&&!s.sin_datos&&missCount(s)===0).length;
  const totalCerr = clientSucs.filter(s=>s.cerrada).length;

  document.getElementById('sidebarSummary').innerHTML =
    (totalFalt>0?'<span class="mini-chip warn">'+totalFalt+' con faltantes</span>':'')
    +'<span class="mini-chip ok">'+totalOk+' completas</span>'
    +(totalCerr>0?'<span class="mini-chip neu">'+totalCerr+' cerradas</span>':'');

  const list = document.getElementById('sucList');
  list.innerHTML = '';

  const ov = document.createElement('div');
  ov.className = 'suc-item overview-item' + (selectedNombre==='__overview__' ? ' active' : '');
  ov.onclick = function(){ selectSuc('__overview__'); };
  ov.innerHTML = '<span class="li-name">📊 Resumen general</span>';
  list.appendChild(ov);

  const div = document.createElement('div');
  div.className = 'sidebar-divider';
  list.appendChild(div);

  sucs.forEach(s=>{
    const m = missCount(s);
    const it = document.createElement('div');
    it.className = 'suc-item' + (s.esFabrica ? ' fab-item' : '') + (s.nombre===selectedNombre ? ' active' : '');
    it.onclick = function(){ selectSuc(s.nombre); };
    let right = '';
    if(s.esFabrica) right = '<span class="fab-tag">FÁBRICA</span>';
    else if(s.sin_datos) right = '<span class="li-dot gray" title="Sin datos"></span>';
    else if(s.cerrada) right = '<span class="closed-tag">CERRADO</span>';
    else if(m===0) right = '<span class="li-dot ok" title="Todo disponible"></span>';
    else right = '<span class="li-badge" title="Faltantes totales">'+m+'</span>';
    it.innerHTML = '<span class="li-name">'+(s.esFabrica?'🏭 ':'')+s.nombre+'</span>'+right;
    list.appendChild(it);
    if(s.esFabrica){
      const div2 = document.createElement('div');
      div2.className = 'sidebar-divider';
      list.appendChild(div2);
    }
  });
}

function ulist(items, cls){
  if(!items || !items.length) return '<div class="ulist empty-note">— ninguno —</div>';
  return '<div class="ulist">' + items.map(n=>'<div class="it'+(cls?(' '+cls):'')+'">'+n+'</div>').join('') + '</div>';
}

function renderDetail(){
  if(!DATA) return;
  if(selectedNombre === '__overview__'){
    renderOverview();
  } else {
    const s = (DATA.sucursales||[]).find(x=>x.nombre===selectedNombre);
    if(!s){ renderOverview(); return; }
    renderSucDetail(s);
  }
}

function renderOverview(){
  const sucs = DATA.sucursales || [];
  const clientSucs = sucs.filter(s=>!s.esFabrica);
  const totalFalt = clientSucs.filter(s=>!s.cerrada&&!s.sin_datos&&missCount(s)>0).length;
  const totalOk   = clientSucs.filter(s=>!s.cerrada&&!s.sin_datos&&missCount(s)===0).length;
  const totalCerr = clientSucs.filter(s=>s.cerrada).length;

  let html = '<div class="summary-bar">'
    + '<div class="sum-card '+(totalFalt>0?'warn':'ok')+'"><div class="num">'+totalFalt+'</div><div class="lbl">Con faltantes</div></div>'
    + '<div class="sum-card ok"><div class="num">'+totalOk+'</div><div class="lbl">Completas</div></div>'
    + '<div class="sum-card"><div class="num" style="color:#fbbf24">'+totalCerr+'</div><div class="lbl">Cerradas</div></div>'
    + '<div class="sum-card"><div class="num" style="color:#a78bfa">'+clientSucs.length+'</div><div class="lbl">Sucursales</div></div>'
    + '</div>';

  html += '<div class="grid">';
  sucs.forEach(s=>{
    const st = statusOf(s);
    let cardClass = 'card';
    if(s.sin_datos) cardClass += ' sin-datos';
    else if(s.cerrada) cardClass += ' cerrada';
    else if(missCount(s)>0) cardClass += ' has-falt';
    else cardClass += ' all-ok';

    let body = '';
    if(s.esFabrica){
      body = '<div class="fab-banner">🏭 Esta es la sucursal fábrica: se usa como referencia para calcular los faltantes del resto.</div>';
    }
    if(s.cerrada){
      body += '<div class="cerr-banner">🔒 Sucursal cerrada al momento del último relevamiento. Los datos pueden no estar actualizados.</div>';
    } else if(!s.sin_datos){
      body += '<div><div class="sec-hdr">🍦 Helado x Kilo <span class="sec-cnt">'+(s.sabores||[]).length+' sabores</span></div><div style="margin-top:6px">';
      if((s.miss_sabores||[]).length===0){
        body += '<div class="ok-line"><span>✓</span> Todos los sabores disponibles</div>';
      } else {
        body += '<div class="falt-list">'+s.miss_sabores.map(f=>'<div class="falt-item">'+f+'</div>').join('')+'</div>';
      }
      body += '</div></div>';

      if((s.miss_guapaletas||[]).length > 0 || (s.guapaletas||[]).length > 0){
        body += '<div><div class="sec-hdr">🍡 Guapaletas <span class="sec-cnt">'+(s.guapaletas||[]).length+' variedades</span></div><div style="margin-top:6px">';
        if((s.miss_guapaletas||[]).length===0){
          body += '<div class="ok-line"><span>✓</span> Todas disponibles</div>';
        } else {
          body += '<div class="falt-list">'+s.miss_guapaletas.map(f=>'<div class="falt-item">'+f+'</div>').join('')+'</div>';
        }
        body += '</div></div>';
      }
    }

    const card = document.createElement('div');
    // se construye como string porque innerHTML += en loop de grid es más simple
    html += '<div class="'+cardClass+'" onclick="selectSuc(\''+s.nombre.replace(/'/g,"\\'")+'\')">'
      + '<div class="card-head">'
      + '<div class="card-icon '+st.iconClass+'">'+st.emoji+'</div>'
      + '<div><div class="card-name">'+s.nombre+'</div><div class="card-addr">'+(s.direccion||'')+'</div></div>'
      + '</div>'
      + '<div class="tags">'+st.tagHtml+'</div>'
      + body
      + '</div>';
  });
  html += '</div>';

  document.getElementById('detail').innerHTML = html;
}

function renderSucDetail(s){
  const st = statusOf(s);
  let html = '<div class="back-btn" onclick="selectSuc(\'__overview__\')">&larr; Volver al resumen</div>';

  html += '<div class="detail-head-row">';
  html += '<div class="detail-head">'
    + '<div class="detail-icon '+st.iconClass+'">'+st.emoji+'</div>'
    + '<div><div class="detail-name">'+s.nombre+'</div><div class="detail-addr">'+(s.direccion||'')+'</div>'
    + '<div class="tags" style="margin-top:8px">'+st.tagHtml+'</div></div>'
    + '</div>';
  if(!s.esFabrica) html += sendButtonHtml(s);
  html += '</div>'; // cierre detail-head-row

  if(s.esFabrica){
    html += '<div class="fab-banner">🏭 Esta es la sucursal fábrica: se usa como referencia para calcular los faltantes del resto de las sucursales.</div>';
  }
  if(s.cerrada){
    html += '<div class="detail-block"><div class="cerr-banner">🔒 Sucursal cerrada al momento del último relevamiento. Los datos pueden no estar actualizados.</div></div>';
  } else if(s.sin_datos){
    html += '<div class="detail-block"><div class="ulist empty-note">Todavía no hay datos relevados para esta sucursal.</div></div>';
  } else {
    html += '<div class="detail-block">'
      + '<div class="detail-block-title">🍦 Helado x Kilo</div>'
      + '<div class="detail-cols">'
      + '<div class="d-col"><div class="d-title '+((s.miss_sabores||[]).length?'bad':'')+'">Sabores faltantes ('+(s.miss_sabores||[]).length+')</div>'+ulist(s.miss_sabores,'miss')+'</div>'
      + '<div class="d-col"><div class="d-title">Sabores disponibles ('+(s.sabores||[]).length+')</div>'+ulist(s.sabores)+'</div>'
      + '</div></div>';

    html += '<div class="detail-block">'
      + '<div class="detail-block-title">🍡 Guapaletas</div>'
      + '<div class="detail-cols">'
      + '<div class="d-col"><div class="d-title '+((s.miss_guapaletas||[]).length?'bad':'')+'">Faltantes ('+(s.miss_guapaletas||[]).length+')</div>'+ulist(s.miss_guapaletas,'miss')+'</div>'
      + '<div class="d-col"><div class="d-title">Disponibles ('+(s.guapaletas||[]).length+')</div>'+ulist(s.guapaletas)+'</div>'
      + '</div></div>';
  }

  // ── Historial ──
  html += '<div class="detail-block" id="histBlock">'
    + '<div class="detail-block-title">💾 Historial guardado</div>'
    + '<div id="histInner_'+cssSafe(s.nombre)+'"></div>'
    + '</div>';

  document.getElementById('detail').innerHTML = html;
  renderHistorial(s);
}

function cssSafe(nombre){
  return nombre.replace(/[^a-zA-Z0-9_]/g,'_');
}

// ── Botón "Enviar faltantes" (Email / WhatsApp, según contacto en la ficha) ──
function sendButtonHtml(s){
  const id = cssSafe(s.nombre);
  const esc = s.nombre.replace(/'/g,"\\'");
  const emailSub = s.email ? '' : '<span class="send-sub">sin configurar</span>';
  const waSub    = s.whatsapp ? '' : '<span class="send-sub">sin configurar</span>';
  return '<div class="send-wrap">'
    + '<button class="send-btn" onclick="toggleSendMenu(event,\''+id+'\')">📤 Enviar faltantes</button>'
    + '<div class="send-menu" id="sendMenu_'+id+'">'
    +   '<div class="send-menu-hint">Enviar a contacto de la sucursal</div>'
    +   '<div class="send-menu-item'+(s.email?'':' disabled')+'" onclick="sendVia(event,\'email\',\''+esc+'\')">✉️&nbsp; Por Email'+emailSub+'</div>'
    +   '<div class="send-menu-item'+(s.whatsapp?'':' disabled')+'" onclick="sendVia(event,\'whatsapp\',\''+esc+'\')">💬&nbsp; Por WhatsApp'+waSub+'</div>'
    + '</div>'
    + '</div>';
}

function toggleSendMenu(e, id){
  e.stopPropagation();
  const menu = document.getElementById('sendMenu_'+id);
  if(!menu) return;
  const wasOpen = menu.classList.contains('open');
  document.querySelectorAll('.send-menu.open').forEach(m=>m.classList.remove('open'));
  if(!wasOpen) menu.classList.add('open');
}
document.addEventListener('click', function(){
  document.querySelectorAll('.send-menu.open').forEach(m=>m.classList.remove('open'));
});

function buildFaltantesMsg(s){
  const lines = [];
  lines.push('Reporte de faltantes — ' + s.nombre);
  lines.push('Fecha: ' + new Date().toLocaleString('es-AR'));
  lines.push('');
  if(s.sin_datos){
    lines.push('Todavía no hay datos relevados para esta sucursal.');
    return lines.join('\n');
  }
  if(s.cerrada){
    lines.push('⚠ Sucursal cerrada al momento del último relevamiento. Los datos pueden no estar actualizados.');
    lines.push('');
  }
  const ms = s.miss_sabores||[], mg = s.miss_guapaletas||[], mh = s.miss_helados||[];
  if(ms.length){
    lines.push('Sabores faltantes (Helado x Kilo):');
    ms.forEach(f=>lines.push('- '+f));
    lines.push('');
  }
  if(mg.length){
    lines.push('Guapaletas faltantes:');
    mg.forEach(f=>lines.push('- '+f));
    lines.push('');
  }
  if(mh.length){
    lines.push('Helados (productos) faltantes:');
    mh.forEach(f=>lines.push('- '+f));
    lines.push('');
  }
  if(!ms.length && !mg.length && !mh.length){
    lines.push('✓ No hay faltantes registrados para esta sucursal.');
  }
  return lines.join('\n');
}

function sendVia(e, channel, nombre){
  e.stopPropagation();
  const s = (DATA.sucursales||[]).find(x=>x.nombre===nombre);
  if(!s) return;
  const msg = buildFaltantesMsg(s);
  if(channel==='email'){
    if(!s.email){
      alert('Esta sucursal todavía no tiene un email configurado.\nPodés agregarlo desde el panel admin, en la ficha de la sucursal.');
      return;
    }
    const subject = encodeURIComponent('Faltantes — '+s.nombre);
    const body = encodeURIComponent(msg);
    window.location.href = 'mailto:'+s.email+'?subject='+subject+'&body='+body;
  } else if(channel==='whatsapp'){
    if(!s.whatsapp){
      alert('Esta sucursal todavía no tiene un WhatsApp configurado.\nPodés agregarlo desde el panel admin, en la ficha de la sucursal.');
      return;
    }
    const phone = s.whatsapp.replace(/[^0-9]/g,'');
    const text = encodeURIComponent(msg);
    window.open('https://wa.me/'+phone+'?text='+text, '_blank');
  }
}

function renderHistorial(s){
  const cont = document.getElementById('histInner_'+cssSafe(s.nombre));
  if(!cont) return;
  const hist = s.historial || [];
  if(!hist.length){
    cont.innerHTML = '<div class="hist-empty">Sin historial guardado aún para esta sucursal</div>';
    return;
  }
  if(histSelIdx[s.nombre]===undefined) histSelIdx[s.nombre]=0;
  const idx = Math.min(histSelIdx[s.nombre], hist.length-1);
  const entry = hist[idx];

  let datesHtml = '<div class="hist-dates-bar">';
  hist.forEach((h,i)=>{
    const dt = new Date(h.ts);
    const lbl = dt.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'2-digit'})
              + ' ' + dt.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
    const closedMark = h.cerrada ? ' 🔒' : '';
    const vMark = h.version ? (' · v'+h.version) : '';
    datesHtml += '<button class="hist-date-btn'+(i===idx?' active':'')+'" onclick="selectHist(\''+s.nombre.replace(/'/g,"\\'")+'\','+i+')">'+lbl+vMark+closedMark+'</button>';
  });
  datesHtml += '</div>';

  const prod = entry.products || [];
  const sab  = entry.sabores  || [];

  let snap = '<div class="hist-meta">Snapshot'+(entry.version?(' v'+entry.version):'')+' del '+new Date(entry.ts).toLocaleString('es-AR')+' — '+prod.length+' productos · '+sab.length+' sabores</div>';
  if(entry.cerrada){
    snap += '<div class="hist-cerrada-banner"><span>🔒</span><div><strong>Sucursal cerrada</strong><div style="font-weight:400;font-size:12px;opacity:.8;margin-top:2px">Este snapshot se guardó cuando la sucursal estaba cerrada.</div></div></div>';
  }
  snap += '<div class="detail-cols">'
    + '<div class="d-col"><div class="d-title">Productos ('+prod.length+')</div>'+ulist(prod)+'</div>'
    + '<div class="d-col"><div class="d-title">Sabores ('+sab.length+')</div>'+ulist(sab)+'</div>'
    + '</div>';

  cont.innerHTML = datesHtml + snap;
}

function selectHist(nombre, idx){
  histSelIdx[nombre] = idx;
  const s = (DATA.sucursales||[]).find(x=>x.nombre===nombre);
  if(s) renderHistorial(s);
}

// Carga inicial + auto-refresh cada 10 minutos
loadData();
setInterval(loadData, 10*60*1000);
</script>
